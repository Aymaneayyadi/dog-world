      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#152C4A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="150" r="200" fill="#E8883A" opacity="0.12"/>
  <circle cx="1000" cy="500" r="250" fill="#F4A261" opacity="0.08"/>
  <circle cx="600" cy="100" r="120" fill="#fff" opacity="0.04"/>
  <!-- Dog assis -->
  <g transform="translate(300, 280)">
