  <!-- Icons autour -->
  <g transform="translate(700, 200)"><circle r="45" fill="#E8883A" opacity="0.2"/><text x="0" y="8" text-anchor="middle" font-size="36">🩺</text></g>
  <g transform="translate(850, 300)"><circle r="45" fill="#40916C" opacity="0.2"/><text x="0" y="8" text-anchor="middle" font-size="36">🍖</text></g>
  <g transform="translate(700, 400)"><circle r="45" fill="#F4A261" opacity="0.2"/><text x="0" y="8" text-anchor="middle" font-size="36">🎾</text></g>
