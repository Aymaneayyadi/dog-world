    <ellipse cx="0" cy="-50" rx="45" ry="40" fill="#D4A373"/>
    <ellipse cx="-15" cy="-55" rx="25" ry="22" fill="#C4955A"/>
    <ellipse cx="15" cy="-55" rx="25" ry="22" fill="#C4955A"/>
    <circle cx="-15" cy="-55" r="8" fill="#1E3A5F"/>
    <circle cx="15" cy="-55" r="8" fill="#1E3A5F"/>
    <ellipse cx="0" cy="-45" rx="8" ry="5" fill="#1E3A5F"/>
