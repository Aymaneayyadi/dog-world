    <path d="M-10 -42 Q0 -25 10 -42" stroke="#1E3A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-55 -70 Q-70 -80 -60 -90" stroke="#E8883A" stroke-width="5" fill="none" stroke-linecap="round"/>
