    <g transform="rotate(-20, -85, -40)"><ellipse cx="-85" cy="-40" rx="40" ry="18" fill="#D4A373" transform="rotate(-15)"/></g>
    <g transform="rotate(20, 85, -40)"><ellipse cx="85" cy="-40" rx="40" ry="18" fill="#D4A373" transform="rotate(15)"/></g>
