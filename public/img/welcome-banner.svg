  <rect x="350" y="480" width="500" height="70" rx="12" fill="rgba(0,0,0,0.35)"/>
  <text x="600" y="515" font-family="Segoe UI, sans-serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="2">Welcome to Dog World</text>
  <text x="600" y="580" font-family="Segoe UI, sans-serif" font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">Your Complete Guide to Canine Happiness</text>
